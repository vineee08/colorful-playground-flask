<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 Color Playground - Interactive</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 30px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            margin-bottom: 30px;
        }

        .header h1 {
            font-family: 'Fredoka One', cursive;
            color: white;
            font-size: 3rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            color: rgba(255,255,255,0.9);
            font-size: 1.1rem;
            margin-top: 10px;
        }

        /* Interactive Tools Section */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .tool-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .tool-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.2);
        }

        .tool-card h3 {
            color: white;
            font-size: 1.3rem;
            margin-bottom: 15px;
        }

        /* Color Mixer */
        .mixer-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .color-input-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .color-input-group label {
            color: white;
            font-weight: 700;
            min-width: 60px;
        }

        .color-picker {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            cursor: pointer;
            padding: 2px;
            background: white;
        }

        .color-picker::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        .color-picker::-webkit-color-swatch {
            border: none;
            border-radius: 10px;
        }

        .mix-result {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 10px;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
        }

        .mix-color-box {
            width: 80px;
            height: 80px;
            border-radius: 15px;
            border: 3px solid rgba(255,255,255,0.3);
            transition: all 0.3s ease;
        }

        .mix-info {
            color: white;
            flex: 1;
        }

        .mix-info .color-name {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .mix-info .color-hex {
            opacity: 0.8;
            font-size: 0.9rem;
        }

        /* Random Color Generator */
        .random-color-display {
            width: 100%;
            height: 150px;
            border-radius: 15px;
            border: 3px solid rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
            position: relative;
        }

        .random-color-display:hover {
            transform: scale(1.02);
        }

        .random-color-display .hex-text {
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .random-color-display .rgb-text {
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .btn {
            padding: 12px 25px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            width: 100%;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.02);
        }

        .btn-primary {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
        }

        /* Create Palette Section */
        .palette-creator {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .palette-colors-preview {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            min-height: 60px;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            border: 2px dashed rgba(255,255,255,0.2);
        }

        .palette-color-chip {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .palette-color-chip:hover {
            transform: scale(1.1);
        }

        .palette-name-input {
            padding: 12px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .palette-name-input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .palette-name-input:focus {
            border-color: rgba(255,255,255,0.5);
        }

        /* Gallery */
        .gallery-section {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .gallery-title {
            color: white;
            font-size: 1.8rem;
            margin-bottom: 20px;
        }

        .palette-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .palette-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s ease;
        }

        .palette-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.2);
        }

        .palette-card .name {
            color: white;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .palette-card .colors {
            display: flex;
            gap: 8px;
        }

        .palette-card .color-swatch {
            flex: 1;
            height: 40px;
            border-radius: 8px;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .palette-card .meta {
            color: rgba(255,255,255,0.6);
            font-size: 0.8rem;
            margin-top: 10px;
        }

        /* Color Info Display */
        .color-info-display {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .info-item {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 10px;
            color: rgba(255,255,255,0.9);
            font-size: 0.9rem;
        }

        .info-item strong {
            display: block;
            font-size: 0.7rem;
            opacity: 0.6;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .tools-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .mix-result {
                flex-direction: column;
                text-align: center;
            }
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            font-weight: 700;
            opacity: 0;
            transform: translateY(100px);
            transition: all 0.5s ease;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 Color Playground</h1>
            <p>Mix colors • Create palettes • Play with colors!</p>
        </div>

        <div class="tools-grid">
            <!-- Color Mixer Tool -->
            <div class="tool-card">
                <h3>🔀 Color Mixer</h3>
                <div class="mixer-container">
                    <div class="color-input-group">
                        <label>Color 1</label>
                        <input type="color" id="color1" class="color-picker" value="#FF0000">
                        <input type="text" id="color1Hex" value="#FF0000" style="flex:1; padding:8px; border-radius:8px; border:2px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.1); color:white;">
                    </div>
                    <div class="color-input-group">
                        <label>Color 2</label>
                        <input type="color" id="color2" class="color-picker" value="#0000FF">
                        <input type="text" id="color2Hex" value="#0000FF" style="flex:1; padding:8px; border-radius:8px; border:2px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.1); color:white;">
                    </div>
                    <button class="btn btn-primary" onclick="mixColors()">🔀 Mix Colors!</button>
                    <div class="mix-result">
                        <div class="mix-color-box" id="mixedColor" style="background: #800080;"></div>
                        <div class="mix-info">
                            <div class="color-name" id="mixedName">Purple</div>
                            <div class="color-hex" id="mixedHex">#800080</div>
                            <div style="font-size:0.8rem; opacity:0.7;" id="mixedRgb">rgb(128, 0, 128)</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Random Color Generator -->
            <div class="tool-card">
                <h3>🎲 Random Color</h3>
                <div class="random-color-display" id="randomColorDisplay" style="background: #FF6B6B;">
                    <div class="hex-text" id="randomHex">#FF6B6B</div>
                    <div class="rgb-text" id="randomRgb">rgb(255, 107, 107)</div>
                    <div class="rgb-text" id="randomName" style="font-size:0.8rem;">Red</div>
                </div>
                <button class="btn" onclick="generateRandomColor()">🎲 Generate Random Color</button>
                <button class="btn" style="margin-top:10px;" onclick="copyRandomColor()">📋 Copy Color</button>
                
                <!-- Color Info -->
                <div class="color-info-display" id="colorInfo">
                    <div class="info-item">
                        <strong>Brightness</strong>
                        <span id="brightness">169.0</span>
                    </div>
                    <div class="info-item">
                        <strong>Light/Dark</strong>
                        <span id="lightDark">Light</span>
                    </div>
                </div>
            </div>

            <!-- Palette Creator -->
            <div class="tool-card">
                <h3>✨ Create Palette</h3>
                <div class="palette-creator">
                    <input type="text" class="palette-name-input" id="paletteName" placeholder="Palette Name">
                    <div class="palette-colors-preview" id="palettePreview">
                        <!-- Colors will be added here -->
                    </div>
                    <div style="display:flex; gap:10px;">
                        <input type="color" id="addColorPicker" class="color-picker" value="#FF6B6B" style="flex:1;">
                        <button class="btn" style="flex:2;" onclick="addColorToPalette()">➕ Add Color</button>
                    </div>
                    <button class="btn btn-primary" onclick="savePalette()">💾 Save Palette</button>
                    <button class="btn" onclick="clearPalette()">🗑️ Clear</button>
                </div>
            </div>
        </div>

        <!-- Gallery -->
        <div class="gallery-section">
            <h2 class="gallery-title">🌈 Color Palettes</h2>
            <div class="palette-grid" id="paletteGrid">
                <!-- Palettes will be rendered here -->
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script>
        // Initialize
        let currentPaletteColors = [];
        let randomColor = '#FF6B6B';

        // Load palettes on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadPalettes();
            generateRandomColor();
            mixColors();
            
            // Sync color inputs
            document.getElementById('color1').addEventListener('input', function() {
                document.getElementById('color1Hex').value = this.value;
                mixColors();
            });
            document.getElementById('color2').addEventListener('input', function() {
                document.getElementById('color2Hex').value = this.value;
                mixColors();
            });
            document.getElementById('color1Hex').addEventListener('change', function() {
                if (isValidHex(this.value)) {
                    document.getElementById('color1').value = this.value;
                    mixColors();
                }
            });
            document.getElementById('color2Hex').addEventListener('change', function() {
                if (isValidHex(this.value)) {
                    document.getElementById('color2').value = this.value;
                    mixColors();
                }
            });
        });

        // Mix Colors
        function mixColors() {
            const color1 = document.getElementById('color1').value;
            const color2 = document.getElementById('color2').value;
            
            fetch('/api/mix_colors', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({color1, color2})
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById('mixedColor').style.background = data.mixed;
                document.getElementById('mixedHex').textContent = data.mixed;
                document.getElementById('mixedName').textContent = data.name;
                document.getElementById('mixedRgb').textContent = data.rgb;
            });
        }

        // Generate Random Color
        function generateRandomColor() {
            fetch('/api/random_color')
                .then(res => res.json())
                .then(data => {
                    randomColor = data.color;
                    const display = document.getElementById('randomColorDisplay');
                    display.style.background = randomColor;
                    document.getElementById('randomHex').textContent = randomColor;
                    
                    // Get color info
                    fetch(`/api/color_info/${randomColor.slice(1)}`)
                        .then(res => res.json())
                        .then(info => {
                            document.getElementById('randomRgb').textContent = info.rgb;
                            document.getElementById('randomName').textContent = info.name;
                            document.getElementById('brightness').textContent = info.brightness;
                            document.getElementById('lightDark').textContent = info.is_light ? '☀️ Light' : '🌙 Dark';
                        });
                });
        }

        // Copy random color
        function copyRandomColor() {
            navigator.clipboard.writeText(randomColor).then(() => {
                showToast(`✅ ${randomColor} copied to clipboard!`);
            });
        }

        // Add color to palette
        function addColorToPalette() {
            const color = document.getElementById('addColorPicker').value;
            if (currentPaletteColors.length < 8) {
                currentPaletteColors.push(color);
                updatePalettePreview();
            } else {
                showToast('⚠️ Maximum 8 colors per palette');
            }
        }

        // Update palette preview
        function updatePalettePreview() {
            const preview = document.getElementById('palettePreview');
            preview.innerHTML = currentPaletteColors.map((color, index) => 
                `<div class="palette-color-chip" style="background:${color};" 
                      onclick="removeColorFromPalette(${index})" 
                      title="Click to remove"></div>`
            ).join('');
        }

        // Remove color from palette
        function removeColorFromPalette(index) {
            currentPaletteColors.splice(index, 1);
            updatePalettePreview();
        }

        // Clear palette
        function clearPalette() {
            currentPaletteColors = [];
            updatePalettePreview();
        }

        // Save palette
        function savePalette() {
            const name = document.getElementById('paletteName').value || 'My Palette';
            if (currentPaletteColors.length < 3) {
                showToast('⚠️ Need at least 3 colors!');
                return;
            }
            
            fetch('/api/save_palette', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name: name,
                    colors: currentPaletteColors
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    showToast(`✅ Palette "${name}" saved!`);
                    currentPaletteColors = [];
                    updatePalettePreview();
                    document.getElementById('paletteName').value = '';
                    loadPalettes();
                }
            });
        }

        // Load palettes
        function loadPalettes() {
            // Get all palettes from server (pre-made + user)
            fetch('/')
                .then(res => res.text())
                .then(html => {
                    // Simple approach - reload page's palette section
                    // For better approach, create a separate API endpoint
                    location.reload();
                });
        }

        // Helper: Validate hex
        function isValidHex(hex) {
            return /^#[0-9A-F]{6}$/i.test(hex);
        }

        // Toast notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            clearTimeout(toast.timeout);
            toast.timeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Render palettes (using data from server)
        function renderPalettes(palettes, userPalettes) {
            // This is handled by the server-side rendering
            // The page reloads to show updated palettes
        }
    </script>
</body>
</html>
